<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CinemaMod YouTube Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        var player;
        var isPlayerReady = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'mute': 1,
                    'controls': 0, 
                    'rel': 0,
                    'showinfo': 0,
                    'modestbranding': 1,
                    'iv_load_policy': 3
                },
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) {
            isPlayerReady = true;
            console.log("Player is ready!");
        }

        function th_video(videoId) {
            console.log("th_video called with: " + videoId); // 디버그용
            if (isPlayerReady && player && player.loadVideoById) {
                player.loadVideoById(videoId);
            } else {
                setTimeout(function() { th_video(videoId); }, 500);
            }
        }
        
    </script>
</body>
</html>
